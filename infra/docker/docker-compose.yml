services:
  postgres:
    image: postgres:17-alpine
    container_name: superava-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: superava_dev
      POSTGRES_USER: superava
      POSTGRES_PASSWORD: superava
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: superava-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: superava
      MINIO_ROOT_PASSWORD: superavasecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
